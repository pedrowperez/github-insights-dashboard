services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: github_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d github_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://app:app@db:5432/github_dashboard
      DB_SSL: "false"
      JWT_SECRET: troque-este-segredo-em-producao
      JWT_EXPIRES_IN: 15m
      REFRESH_EXPIRES_DAYS: "7"
      CLIENT_URL: http://localhost:8080
      PORT: 3000
      # GITHUB_TOKEN: opcional para aumentar o rate limit
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
